name: build

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.3'
          - '8.4'
          - '8.5'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: json, mbstring
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Build
        run: composer build

  prefer-lowest:
    name: Prefer lowest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: json, mbstring
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer update --prefer-lowest --prefer-stable --no-interaction --no-progress

      - name: Build
        run: composer build

  coverage:
    name: Coverage & Mutation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          coverage: pcov
          extensions: json, mbstring
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Test with coverage
        run: composer test:coverage:ci

      - name: Mutation testing
        run: composer mutation

  compatibility:
    name: Backward compatibility
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          coverage: none
          extensions: json, mbstring, bcmath, intl
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Backward compatibility check
        # rector/rector's composer autoload is files-only (classes load through
        # rector's own scoped autoloader), so roave cannot reflect
        # AbstractRector-derived symbols and reports them as "[BC] SKIPPED ...
        # could not be found in the located source", counting each as a break.
        # Tolerate runs where every finding is SKIPPED; any real [BC] break
        # still fails.
        run: |
          LATEST="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -z "$LATEST" ]; then
            echo "No previous tag - skipping BC check"
            exit 0
          fi
          CODE=0
          OUT=$(composer bc-check -- --from="$LATEST" --install-development-dependencies 2>&1) || CODE=$?
          echo "$OUT"
          if [ "$CODE" -ne 0 ]; then
            if echo "$OUT" | grep '^\[BC\] ' | grep -qv '^\[BC\] SKIPPED'; then
              exit "$CODE"
            fi
            echo "Only SKIPPED findings (unresolvable rector internals) - treating as pass"
          fi
